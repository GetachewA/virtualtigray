version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: virtualtigray_postgres
    restart: always
    environment:
      POSTGRES_DB: virtualtigray
      POSTGRES_USER: vtg_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - virtualtigray_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vtg_user -d virtualtigray"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:18-alpine
    container_name: virtualtigray_backend
    restart: always
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install --omit=dev && npm start"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: virtualtigray
      DB_USER: vtg_user
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - virtualtigray_network
    labels:
      - traefik.enable=true
      - traefik.http.routers.virtualtigray.rule=Host(`virtualtigray-api.apps.apparium.ca`)
      - traefik.http.services.virtualtigray.loadbalancer.server.port=3000
      - coolify.managed=true

volumes:
  postgres_data:

networks:
  virtualtigray_network:
    driver: bridge
